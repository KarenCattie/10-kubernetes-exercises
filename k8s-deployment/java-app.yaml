apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app-deployment
  labels:
    app: java-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app   # links Deployment → Pods
  template:
    metadata:
      labels:
        app: java-app
    spec:
      imagePullSecrets:
        - name: my-docker-registry-key      # This need to create using kubectl in the same namespace as the workload

      containers:
        - name: java-mysql-app
          image: catdomeow/08-jenkins-exercises:k8s-exercise-10-java-app-1.0
          ports:
          - containerPort: 8080
          env:
            # Secrets pulled from db-secret.yaml
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret   # must match Secret metadata.name
                  key: db_user      # must match key in Secret data
            - name: DB_PWD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db_pwd
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: db_name
            # Non-sensitive config pulled from db-config.yaml
            - name: DB_SERVER
              valueFrom:
                configMapKeyRef:
                  name: db-config    # must match ConfigMap metadata.name
                  key: db-server     # must match key in ConfigMap data
---
apiVersion: v1
kind: Service
metadata:
  name: java-app-service
spec:
  selector:
    app: java-app   # routes traffic to pods with this label
  ports:
  - port: 8080
    targetPort: 8080
